# --- Text Sensors ---

text_sensor:
  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Overall State"
    id: inverter_overall_state
    register_type: holding
    raw_encode: HEXBYTES
    address: 59
    lambda: |-
      uint16_t value = modbus_controller::word_from_hex_str(x, 0);
      switch (value) {
        case 0: return std::string("standby");
        case 1: return std::string("selftest");
        case 2: return std::string("normal");
        case 3: return std::string("alarm");
        case 4: return std::string("fault");
        default: return std::string("unknown");
      }

  - platform: template
    name: "${friendly_name} Time Slot 1"
    id: inverter_time_slot_1
    icon: "mdi:clock"
    update_interval: 60s
    lambda: |-
      if (!id(inverter_system_mode_time1).has_state()) return {};
      int val = static_cast<int>(id(inverter_system_mode_time1).state);
      int hours = val / 100;
      int minutes = val % 100;
      char buf[6];
      snprintf(buf, sizeof(buf), "%02d:%02d", hours, minutes);
      return esphome::optional<std::string>(buf);

