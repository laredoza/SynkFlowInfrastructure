substitutions:
  friendly_name: "sunsynk"
  fast_update_interval: "5s"
  medium_skip_updates: "5"    # 5 * 5s = 30s
  slow_skip_updates: "11"     # 11 * 5s = 60s

esphome:
  name: sunsynk

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Sunsynk Fallback"
    password: "fallback123"

captive_portal:

logger:
  baud_rate: 0  # Disable serial logging — UART is used for Modbus

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  topic_prefix: sunsynk
  discovery: false

time:
  - platform: homeassistant
    id: homeassistant_time

# --- UART / Modbus ---

uart:
  id: mod_bus
  tx_pin: 16
  rx_pin: 4
  baud_rate: 9600
  stop_bits: 1
  flow_control_pin: 18

modbus:
  id: inverter_modbus

modbus_controller:
  - id: inverter
    address: 0x01
    modbus_id: inverter_modbus
    setup_priority: -10
    update_interval: ${fast_update_interval}
    command_throttle: 100ms

# --- Binary Sensors ---

binary_sensor:
  - platform: modbus_controller
    name: "${friendly_name} Grid Connected Status"
    id: inverter_grid_connected_status
    register_type: holding
    address: 194

  - platform: modbus_controller
    name: "${friendly_name} Gen Peak Shaving Status"
    id: inverter_gen_peak_shaving_status
    register_type: holding
    address: 280
    bitmask: 0x10

  - platform: modbus_controller
    name: "${friendly_name} Grid Peak Shaving Status"
    id: inverter_grid_peak_shaving_status
    register_type: holding
    address: 280
    bitmask: 0x100

# --- Sensors ---

sensor:
  # Firmware
  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Firmware Control Board"
    id: inverter_firmware_control_board
    register_type: holding
    address: 13

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Firmware Comms Board"
    id: inverter_firmware_comms_board
    register_type: holding
    address: 14

  # --- Battery Sensors ---

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Battery Charge Day"
    id: inverter_battery_charge_day
    register_type: holding
    address: 70
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Battery Discharge Day"
    id: inverter_battery_discharge_day
    register_type: holding
    address: 71
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Total Battery Charge"
    id: inverter_total_battery_charge
    register_type: holding
    address: 72
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Total Battery Discharge"
    id: inverter_total_battery_discharge
    register_type: holding
    address: 74
    unit_of_measurement: "kWh"
    accuracy_decimals: 0
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Battery Temperature"
    id: inverter_battery_temperature
    register_type: holding
    address: 182
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    value_type: U_WORD
    filters:
      - offset: -1000
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Battery Voltage"
    id: inverter_battery_voltage
    register_type: holding
    address: 183
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Battery SOC"
    id: inverter_battery_soc
    register_type: holding
    address: 184
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    value_type: U_WORD

  - platform: modbus_controller
    name: "${friendly_name} Battery Power"
    id: inverter_battery_power
    register_type: holding
    address: 190
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    value_type: S_WORD

  - platform: modbus_controller
    name: "${friendly_name} Battery Current"
    id: inverter_battery_current
    register_type: holding
    address: 191
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    value_type: S_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Battery Charging Efficiency"
    id: inverter_battery_charging_efficiency
    register_type: holding
    address: 216
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: battery
    filters:
      - lambda: |-
          if (x > 32767) return (x - 65535) / 10;
          else return x / 10;

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Battery Capacity Shutdown"
    id: inverter_battery_capacity_shutdown
    register_type: holding
    address: 217
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery

  # --- Inverter Sensors ---

  - platform: modbus_controller
    name: "${friendly_name} Inverter Power"
    id: inverter_inverter_power
    register_type: holding
    address: 175
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    value_type: S_WORD

  - platform: modbus_controller
    name: "${friendly_name} Inverter Voltage"
    id: inverter_inverter_voltage
    register_type: holding
    address: 154
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    name: "${friendly_name} Inverter Current"
    id: inverter_inverter_current
    register_type: holding
    address: 164
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    value_type: S_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    name: "${friendly_name} Inverter Frequency"
    id: inverter_inverter_frequency
    register_type: holding
    address: 193
    unit_of_measurement: "Hz"
    accuracy_decimals: 2
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.01

  # --- Temperature Sensors ---

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} DC Transformer Temperature"
    id: inverter_dc_transformer_temperature
    register_type: holding
    address: 90
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    value_type: S_WORD
    filters:
      - offset: -1000
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Radiator Temperature"
    id: inverter_radiator_temperature
    register_type: holding
    address: 91
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    value_type: S_WORD
    filters:
      - offset: -1000
      - multiply: 0.1

  # --- Grid Sensors ---

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Grid Import Day"
    id: inverter_grid_import_day
    register_type: holding
    address: 76
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Grid Export Day"
    id: inverter_grid_export_day
    register_type: holding
    address: 77
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Total Grid Import"
    id: inverter_total_grid_import
    register_type: holding
    address: 78
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Grid Frequency"
    id: inverter_grid_frequency
    register_type: holding
    address: 79
    unit_of_measurement: "Hz"
    accuracy_decimals: 2
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Total Grid Export"
    id: inverter_total_grid_export
    register_type: holding
    address: 81
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    name: "${friendly_name} Grid Power"
    id: inverter_grid_power_169
    register_type: holding
    address: 169
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    value_type: S_WORD
    filters:
      - multiply: 10

  - platform: modbus_controller
    name: "${friendly_name} Grid LD Power"
    id: inverter_grid_power_167
    register_type: holding
    address: 167
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    value_type: S_WORD
    filters:
      - multiply: 10

  - platform: modbus_controller
    name: "${friendly_name} Grid Voltage"
    id: inverter_grid_voltage
    register_type: holding
    address: 150
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    name: "${friendly_name} Grid Current"
    id: inverter_grid_current
    register_type: holding
    address: 160
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    value_type: S_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    name: "${friendly_name} Grid CT Power"
    id: inverter_grid_ct_power
    register_type: holding
    address: 172
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    value_type: S_WORD

  # --- Load Sensors ---

  - platform: modbus_controller
    name: "${friendly_name} Load Power"
    id: inverter_load_power
    register_type: holding
    address: 178
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    value_type: S_WORD
    filters:
      - multiply: 10

  - platform: modbus_controller
    name: "${friendly_name} Load Frequency"
    id: inverter_load_frequency
    register_type: holding
    address: 192
    unit_of_measurement: "Hz"
    accuracy_decimals: 2
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Day Load Energy"
    id: inverter_day_load_energy
    register_type: holding
    address: 84
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Total Load Energy"
    id: inverter_total_load_energy
    register_type: holding
    address: 85
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.1

  # --- PV Sensors ---

  - platform: modbus_controller
    name: "${friendly_name} PV1 Power"
    id: inverter_pv1_power
    register_type: holding
    address: 186
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    value_type: U_WORD

  - platform: modbus_controller
    name: "${friendly_name} PV1 Voltage"
    id: inverter_pv1_voltage
    register_type: holding
    address: 109
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    name: "${friendly_name} PV1 Current"
    id: inverter_pv1_current
    register_type: holding
    address: 110
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    name: "${friendly_name} PV2 Power"
    id: inverter_pv2_power
    register_type: holding
    address: 187
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    value_type: U_WORD

  - platform: modbus_controller
    name: "${friendly_name} PV2 Voltage"
    id: inverter_pv2_voltage
    register_type: holding
    address: 111
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    name: "${friendly_name} PV2 Current"
    id: inverter_pv2_current
    register_type: holding
    address: 112
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    value_type: U_WORD
    filters:
      - multiply: 0.1

  # --- Solar Totals ---

  - platform: template
    name: "${friendly_name} Solar Power"
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    lambda: |-
      if (id(inverter_pv1_power).has_state() && id(inverter_pv2_power).has_state()) {
        return id(inverter_pv1_power).state + id(inverter_pv2_power).state;
      } else {
        return NAN;
      }
    update_interval: ${fast_update_interval}

  - platform: modbus_controller
    skip_updates: ${medium_skip_updates}
    name: "${friendly_name} Day PV Energy"
    id: inverter_day_pv_energy
    register_type: holding
    address: 108
    unit_of_measurement: "kWh"
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    value_type: U_WORD
    filters:
      - multiply: 0.1

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} Total PV Energy"
    id: inverter_total_pv_energy
    register_type: holding
    address: 96
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.1

  - platform: total_daily_energy
    name: "${friendly_name} PV1 Daily Energy"
    power_id: inverter_pv1_power
    unit_of_measurement: "kWh"
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: total_daily_energy
    name: "${friendly_name} PV2 Daily Energy"
    power_id: inverter_pv2_power
    unit_of_measurement: "kWh"
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # --- AUX / Essential / Non-essential ---

  - platform: modbus_controller
    name: "${friendly_name} AUX Power"
    id: inverter_aux_power
    register_type: holding
    address: 166
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    value_type: S_WORD

  - platform: template
    name: "${friendly_name} Essential Power"
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    lambda: |-
      if (id(inverter_inverter_power).has_state() && id(inverter_grid_power_167).has_state() && id(inverter_aux_power).has_state()) {
        return id(inverter_inverter_power).state + id(inverter_grid_power_167).state - id(inverter_aux_power).state;
      } else {
        return NAN;
      }
    update_interval: ${fast_update_interval}

  - platform: template
    name: "${friendly_name} Nonessential Power"
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    lambda: |-
      if (id(inverter_grid_ct_power).has_state() && id(inverter_grid_power_167).has_state()) {
        return id(inverter_grid_ct_power).state - id(inverter_grid_power_167).state;
      } else {
        return NAN;
      }
    update_interval: ${fast_update_interval}

  # --- Settings Sensors (time slots) ---

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} System Mode Time1"
    id: inverter_system_mode_time1
    register_type: holding
    address: 250
    icon: "mdi:clock"

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} System Mode Time2"
    id: inverter_system_mode_time2
    register_type: holding
    address: 251
    icon: "mdi:clock"

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} System Mode Time3"
    id: inverter_system_mode_time3
    register_type: holding
    address: 252
    icon: "mdi:clock"

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} System Mode Time4"
    id: inverter_system_mode_time4
    register_type: holding
    address: 253
    icon: "mdi:clock"

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} System Mode Time5"
    id: inverter_system_mode_time5
    register_type: holding
    address: 254
    icon: "mdi:clock"

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    name: "${friendly_name} System Mode Time6"
    id: inverter_system_mode_time6
    register_type: holding
    address: 255
    icon: "mdi:clock"

  - platform: modbus_controller
    skip_updates: ${slow_skip_updates}
    id: grid_peak_shaving_raw
    register_type: holding
    address: 280
    value_type: U_WORD

# --- Switches ---

switch:
  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Toggle Solar Sell"
    id: inverter_toggle_solar_sell
    register_type: holding
    address: 247
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Toggle System Timer"
    id: inverter_toggle_system_timer
    register_type: holding
    address: 248
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Toggle Priority Load"
    id: inverter_toggle_priority_load
    register_type: holding
    address: 243
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Toggle Force Generator"
    id: inverter_toggle_force_generator
    register_type: holding
    address: 326
    bitmask: 8192
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Grid Charge Time1"
    id: inverter_toggle_grid_charge_time1
    register_type: holding
    address: 274
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Grid Charge Time2"
    id: inverter_toggle_grid_charge_time2
    register_type: holding
    address: 275
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Grid Charge Time3"
    id: inverter_toggle_grid_charge_time3
    register_type: holding
    address: 276
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Grid Charge Time4"
    id: inverter_toggle_grid_charge_time4
    register_type: holding
    address: 277
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Grid Charge Time5"
    id: inverter_toggle_grid_charge_time5
    register_type: holding
    address: 278
    bitmask: 1
    icon: "mdi:toggle-switch"

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} Grid Charge Time6"
    id: inverter_toggle_grid_charge_time6
    register_type: holding
    address: 279
    bitmask: 1
    icon: "mdi:toggle-switch"

# --- Number Controls ---

number:
  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} System Mode SoC Time1"
    id: inverter_set_soc_time1
    unit_of_measurement: "%"
    address: 268
    min_value: 0
    max_value: 100
    step: 5
    value_type: U_WORD

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} System Mode SoC Time2"
    id: inverter_set_soc_time2
    unit_of_measurement: "%"
    address: 269
    min_value: 0
    max_value: 100
    step: 5
    value_type: U_WORD

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} System Mode SoC Time3"
    id: inverter_set_soc_time3
    unit_of_measurement: "%"
    address: 270
    min_value: 0
    max_value: 100
    step: 5
    value_type: U_WORD

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} System Mode SoC Time4"
    id: inverter_set_soc_time4
    unit_of_measurement: "%"
    address: 271
    min_value: 0
    max_value: 100
    step: 5
    value_type: U_WORD

  - platform: modbus_controller
    use_write_multiple: true
    name: "${friendly_name} System Mode SoC Time5"
